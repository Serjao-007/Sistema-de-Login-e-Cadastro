<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styleC.css">
</head>
<body>
    <main>
        <div class="container-auth">
            <form class="Form-usuario">
                <h2>Criar Conta</h2>
                <p class="subtitulo">Cadastre-se para gerenciar suas tarefas</p>
                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Digite seu email" required>
                </div>
                <div class="input-group">
                    <label for="senha">Crie uma senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha forte" required>
                </div>
                <button id="botao" type="submit">Cadastrar</button>
                <div class="link-rodape">
                    Já tem uma conta? <a href="index.html">Faça login aqui</a>
                </div>
            </form>
        </div>
    </main>
    <script>
        document.getElementById("botao").addEventListener('click', async function(event) {
            event.preventDefault(); // Evita que a página recarregue
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            try {
                const resposta = await fetch('http://localhost:3000/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome, email: email, senha: senha })
                });
                const dados = await resposta.json();
                if (dados.sucesso) {
                    alert("Cadastro realizado! Indo para o login...");
                    window.location.href = 'index.html'; 
                } else {
                    alert("Erro ao cadastrar. O email já existe?");
                }
            } catch (erro) {
                alert("Erro ao conectar com o servidor. O 'node server.js' está rodando?");
            }
        });
    </script>
</body>
</html>
